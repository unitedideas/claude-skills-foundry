name: NHS Agentic Readiness Score

on:
  schedule:
    - cron: "0 14 * * 1"  # Mondays 14:00 UTC — weekly drift check
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - name: Score nothumansearch.ai (reference site)
        uses: unitedideas/nhs-score-check-action@v1
        with:
          domain: nothumansearch.ai
          min-score: 85

      - name: Score aidevboard.com
        uses: unitedideas/nhs-score-check-action@v1
        with:
          domain: aidevboard.com
          min-score: 85

      - name: Score 8bitconcepts.com
        uses: unitedideas/nhs-score-check-action@v1
        with:
          domain: 8bitconcepts.com
          min-score: 85
